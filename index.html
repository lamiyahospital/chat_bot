<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#bf1a8a">
    <meta name="description" content="Offline AI-style assistant for Lamiya Hospital.">
    <title>Lamiya AI Assistant</title>
    <style>
:root {
  color-scheme: light;
  --primary: #bf1a8a;
  --primary-deep: #8e2269;
  --accent: #d946ef;
  --violet: #a855f7;
  --text: #18111a;
  --muted: #66586a;
  --surface: rgba(255, 255, 255, 0.62);
  --surface-strong: rgba(255, 255, 255, 0.86);
  --surface-soft: rgba(255, 255, 255, 0.3);
  --border: rgba(255, 255, 255, 0.68);
  --shadow: 0 30px 90px rgba(142, 34, 105, 0.2);
  --radius-xl: 30px;
  --radius-md: 18px;
  --blur: blur(30px) saturate(150%);
  --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

[data-theme="dark"] {
  color-scheme: dark;
  --text: #fff7fd;
  --muted: #d9c5d8;
  --surface: rgba(31, 20, 34, 0.62);
  --surface-strong: rgba(36, 24, 40, 0.86);
  --surface-soft: rgba(255, 255, 255, 0.08);
  --border: rgba(255, 255, 255, 0.18);
  --shadow: 0 34px 100px rgba(0, 0, 0, 0.34);
}

html[lang="ml"] body,
html[lang="ml"] button,
html[lang="ml"] input,
html[lang="ml"] select {
  font-family: "Noto Sans Malayalam", "Nirmala UI", var(--font);
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
}

body {
  min-height: 100vh;
  margin: 0;
  font-family: var(--font);
  color: var(--text);
  background:
    radial-gradient(circle at 16% 14%, rgba(217, 70, 239, 0.2), transparent 24rem),
    radial-gradient(circle at 86% 18%, rgba(191, 26, 138, 0.16), transparent 26rem),
    linear-gradient(145deg, #ffffff 0%, #fbf7fc 42%, #f3f4f6 100%);
  overflow-x: hidden;
}

[data-theme="dark"] body {
  background:
    radial-gradient(circle at 16% 14%, rgba(217, 70, 239, 0.24), transparent 25rem),
    radial-gradient(circle at 88% 14%, rgba(168, 85, 247, 0.18), transparent 27rem),
    linear-gradient(145deg, #150f17 0%, #1e1320 52%, #110c13 100%);
}

body::before,
body::after {
  content: "";
  position: fixed;
  inset: auto;
  pointer-events: none;
  filter: blur(55px);
  opacity: 0.45;
}

body::before {
  width: 40vw;
  height: 40vw;
  right: -10vw;
  bottom: -16vw;
  background: linear-gradient(135deg, rgba(191, 26, 138, 0.22), rgba(168, 85, 247, 0.14));
}

body::after {
  width: 32vw;
  height: 32vw;
  left: -10vw;
  top: 36vh;
  background: rgba(217, 70, 239, 0.14);
}

button,
input {
  font: inherit;
}

button {
  cursor: pointer;
}

button:focus-visible,
input:focus-visible {
  outline: 3px solid rgba(217, 70, 239, 0.42);
  outline-offset: 3px;
}

.loading-screen {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: grid;
  place-items: center;
  gap: 18px;
  align-content: center;
  background: rgba(255, 255, 255, 0.92);
  transition: opacity 500ms ease, visibility 500ms ease;
}

[data-theme="dark"] .loading-screen {
  background: rgba(19, 12, 21, 0.94);
}

.loading-screen.is-hidden {
  opacity: 0;
  visibility: hidden;
}

.loader-mark {
  display: grid;
  place-items: center;
  width: 74px;
  height: 74px;
  border-radius: 26px;
  color: #fff;
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--violet));
  box-shadow: 0 18px 50px rgba(191, 26, 138, 0.32);
  animation: loaderPulse 1.2s ease-in-out infinite;
}

.loader-bar {
  width: min(260px, 70vw);
  height: 8px;
  overflow: hidden;
  border-radius: 999px;
  background: rgba(191, 26, 138, 0.12);
}

.loader-bar span {
  display: block;
  width: 44%;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  animation: loaderSlide 1s ease-in-out infinite;
}

.app-shell {
  position: relative;
  z-index: 1;
  width: min(1220px, calc(100% - 32px));
  min-height: 100vh;
  margin: 0 auto;
  padding: 22px 0 28px;
}

.glass-panel {
  border: 1px solid var(--border);
  background:
    linear-gradient(140deg, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0.16)),
    var(--surface);
  box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.62);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
}

[data-theme="dark"] .glass-panel {
  background:
    linear-gradient(140deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.03)),
    var(--surface);
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  min-height: 86px;
  padding: 16px 18px 16px 22px;
  border-radius: var(--radius-xl);
}

.eyebrow {
  margin: 0 0 4px;
  color: var(--primary);
  font-size: 0.72rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

h1,
h2,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 4px;
  font-size: clamp(1.4rem, 3vw, 2.3rem);
  line-height: 1;
}

.topbar p:last-child,
.chat-header p {
  margin-bottom: 0;
  color: var(--muted);
}

.topbar-actions,
.header-actions,
.tool-row,
.composer,
.suggestions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-height: 42px;
  padding: 0 14px;
  border: 1px solid rgba(36, 190, 119, 0.24);
  border-radius: 999px;
  color: #14724a;
  background: rgba(44, 211, 138, 0.12);
  font-size: 0.88rem;
  font-weight: 750;
  white-space: nowrap;
}

[data-theme="dark"] .status-pill {
  color: #88f0be;
}

.status-pill span {
  width: 9px;
  height: 9px;
  border-radius: 999px;
  background: #17c964;
  box-shadow: 0 0 0 6px rgba(23, 201, 100, 0.14);
}

.icon-button,
.text-button,
.send-button,
.tool-row button,
.suggestions button,
.message-actions button,
.action-link {
  border: 1px solid rgba(191, 26, 138, 0.14);
  color: var(--text);
  background: rgba(255, 255, 255, 0.42);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.56), 0 12px 28px rgba(142, 34, 105, 0.08);
  transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
}

.icon-button {
  flex: 0 0 auto;
  display: grid;
  place-items: center;
  width: 44px;
  height: 44px;
  border-radius: 16px;
  font-weight: 850;
}

.text-button,
.tool-row button,
.suggestions button,
.send-button,
.action-link {
  min-height: 40px;
  border-radius: 16px;
  padding: 0 14px;
  font-weight: 760;
}

.send-button,
.action-link.primary {
  border-color: transparent;
  color: #fff;
  background: linear-gradient(135deg, var(--primary), var(--violet));
}

button:hover,
.action-link:hover {
  transform: translateY(-2px);
  box-shadow: 0 16px 34px rgba(142, 34, 105, 0.16);
}

button:active,
.action-link:active {
  transform: translateY(0) scale(0.98);
}

.hero-area {
  display: grid;
  grid-template-columns: minmax(300px, 0.86fr) minmax(380px, 1.14fr);
  gap: 24px;
  align-items: center;
  padding: 24px 0 0;
}

.robot-stage {
  position: relative;
  min-height: 650px;
  display: grid;
  place-items: center;
  overflow: visible;
  perspective: 1400px;
  perspective-origin: 50% 45%;
}

.robot-glow {
  position: absolute;
  width: min(540px, 90vw);
  aspect-ratio: 1;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(191, 26, 138, 0.28), rgba(217, 70, 239, 0.1) 42%, transparent 70%);
  filter: blur(24px);
  animation: ambientBreath 4.8s ease-in-out infinite;
}

.robot-card {
  position: relative;
  width: min(560px, 94vw);
  animation: robot3D 6s ease-in-out infinite;
  transform-style: preserve-3d;
  transform-origin: 50% 60%;
  filter: drop-shadow(0 34px 38px rgba(142, 34, 105, 0.22));
  cursor: grab;
}

.robot-card:hover {
  animation-play-state: paused;
}

.robot-card:active {
  animation-play-state: paused;
  cursor: grabbing;
}

.robot-image {
  display: block;
  width: 100%;
  height: auto;
  user-select: none;
  pointer-events: none;
  animation: robotWave 3.6s ease-in-out infinite;
}

.eye {
  position: absolute;
  top: 30.1%;
  width: 13%;
  aspect-ratio: 1 / 1.34;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 38%, rgba(255, 255, 255, 0.95), rgba(145, 255, 255, 0.7) 36%, rgba(94, 235, 245, 0.2) 70%);
  mix-blend-mode: screen;
  opacity: 0.68;
  filter: blur(0.3px) drop-shadow(0 0 14px rgba(127, 245, 255, 0.8));
  animation: robotEye 5.2s ease-in-out infinite;
}

.eye-left {
  left: 42.2%;
}

.eye-right {
  left: 56.9%;
  animation-delay: 90ms;
}

.scanner {
  position: absolute;
  border: 4px solid rgba(248, 118, 229, 0.9);
  filter: drop-shadow(0 0 9px rgba(217, 70, 239, 0.72));
  opacity: 0;
  animation: scannerPulse 3.8s ease-in-out infinite;
}

.scanner-one {
  top: 24.7%;
  left: 39.6%;
  width: 22px;
  height: 22px;
  border-right: 0;
  border-bottom: 0;
}

.scanner-two {
  top: 24.9%;
  right: 28.4%;
  width: 22px;
  height: 22px;
  border-left: 0;
  border-bottom: 0;
  animation-delay: 400ms;
}

.scanner-three {
  bottom: 43.6%;
  right: 30%;
  width: 22px;
  height: 22px;
  border-left: 0;
  border-top: 0;
  animation-delay: 800ms;
}

.robot-shadow {
  position: absolute;
  bottom: 6%;
  width: 56%;
  max-width: 360px;
  height: 40px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(142, 34, 105, 0.26), transparent 70%);
  filter: blur(12px);
  animation: shadowPulse 4.6s ease-in-out infinite;
}

.chat-window {
  display: flex;
  flex-direction: column;
  min-height: min(760px, calc(100vh - 142px));
  height: auto;
  max-height: none;
  border-radius: var(--radius-xl);
  padding: 18px;
  overflow: visible;
}

.chat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid rgba(191, 26, 138, 0.12);
}

.chat-header h2 {
  margin-bottom: 4px;
  font-size: clamp(1.35rem, 2.4vw, 2rem);
  line-height: 1.08;
}

.tool-row,
.suggestions {
  flex-wrap: wrap;
}

.tool-row {
  padding: 14px 0 10px;
}

.tool-row button,
.suggestions button {
  min-height: 36px;
  padding: 0 12px;
  font-size: 0.88rem;
}

.search-box {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 46px;
  margin-bottom: 12px;
  padding: 0 14px;
  border: 1px solid rgba(191, 26, 138, 0.12);
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.42);
}

.search-box span {
  color: var(--primary);
  font-size: 0.8rem;
  font-weight: 850;
}

.search-box input,
.composer input {
  width: 100%;
  min-width: 0;
  border: 0;
  color: var(--text);
  background: transparent;
  outline: 0;
}

.chat-messages {
  /* Keep messages in normal flow so new replies push the controls below them. */
  display: block;
  flex: 0 0 auto;
  flex-shrink: 0;
  height: auto;
  min-height: 280px;
  max-height: none;
  overflow: visible;
  padding: 8px 4px 12px;
  scroll-behavior: smooth;
}

/* Ensure suggestions + composer stay in normal flow below the transcript */
.suggestions,
.composer {
  position: static;
  flex: 0 0 auto;
  flex-shrink: 0;
}

.chat-messages::-webkit-scrollbar {
  width: 9px;
}

.chat-messages::-webkit-scrollbar-thumb {
  border-radius: 999px;
  background: rgba(191, 26, 138, 0.22);
}

.message {
  display: grid;
  gap: 7px;
  width: fit-content;
  max-width: min(86%, 680px);
  margin: 0 0 14px;
  animation: messageIn 240ms ease both;
}

.message.user {
  margin-left: auto;
  justify-items: end;
}

.bubble {
  padding: 13px 15px;
  border: 1px solid rgba(255, 255, 255, 0.55);
  border-radius: 20px 20px 20px 8px;
  color: var(--text);
  background: rgba(255, 255, 255, 0.66);
  line-height: 1.5;
  white-space: pre-wrap;
}

[data-theme="dark"] .bubble {
  background: rgba(255, 255, 255, 0.08);
}

.message.user .bubble {
  border-color: transparent;
  border-radius: 20px 20px 8px 20px;
  color: #fff;
  background: linear-gradient(135deg, var(--primary), var(--primary-deep));
}

.meta {
  color: var(--muted);
  font-size: 0.72rem;
}

.message-actions {
  display: flex;
  gap: 7px;
}

.message-actions button {
  min-height: 28px;
  padding: 0 9px;
  border-radius: 10px;
  font-size: 0.74rem;
}

.inline-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.action-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 36px;
  text-decoration: none;
}

.typing-indicator {
  display: none;
  gap: 5px;
  align-items: center;
  width: fit-content;
  padding: 10px 12px;
  margin: 0 0 10px 4px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.6);
}

.typing-indicator.is-visible {
  display: flex;
}

.typing-indicator span {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--primary);
  animation: dotWave 1s ease-in-out infinite;
}

.typing-indicator span:nth-child(2) {
  animation-delay: 120ms;
}

.typing-indicator span:nth-child(3) {
  animation-delay: 240ms;
}

.suggestions {
  min-height: 42px;
  padding: 4px 0 12px;
}

.language-switch {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  min-height: 40px;
  padding: 0 10px;
  border: 1px solid rgba(191, 26, 138, 0.14);
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.42);
  color: var(--text);
  font-size: 0.82rem;
  font-weight: 760;
}

.language-switch select {
  min-width: 104px;
  border: 0;
  color: inherit;
  background: transparent;
  font: inherit;
  outline: 0;
  cursor: pointer;
}

[data-theme="dark"] .language-switch {
  background: rgba(255, 255, 255, 0.08);
}

.composer {
  min-height: 62px;
  padding: 8px;
  border: 1px solid rgba(191, 26, 138, 0.14);
  border-radius: 22px;
  background: rgba(255, 255, 255, 0.5);
}

[data-theme="dark"] .composer,
[data-theme="dark"] .search-box {
  background: rgba(255, 255, 255, 0.08);
}

.composer input {
  height: 44px;
}

.app-footer {
  padding-top: 12px;
  color: var(--muted);
  text-align: center;
  font-size: 0.78rem;
}

.is-muted {
  opacity: 0.45;
}

.is-hidden {
  display: none !important;
}

.search-hit .bubble {
  box-shadow: 0 0 0 3px rgba(217, 70, 239, 0.22);
}

@keyframes loaderPulse {
  50% {
    transform: translateY(-4px) scale(1.04);
  }
}

@keyframes loaderSlide {
  0% {
    transform: translateX(-105%);
  }
  100% {
    transform: translateX(245%);
  }
}

@keyframes robot3D {
  0% {
    transform: translate3d(0, 0, 0) rotateX(0deg) rotateY(-14deg) rotateZ(-1.5deg);
  }
  25% {
    transform: translate3d(-6px, -14px, 30px) rotateX(6deg) rotateY(-6deg) rotateZ(-0.5deg);
  }
  50% {
    transform: translate3d(0, -24px, 60px) rotateX(2deg) rotateY(10deg) rotateZ(2deg);
  }
  75% {
    transform: translate3d(6px, -12px, 30px) rotateX(-4deg) rotateY(4deg) rotateZ(1deg);
  }
  100% {
    transform: translate3d(0, 0, 0) rotateX(0deg) rotateY(-14deg) rotateZ(-1.5deg);
  }
}

@keyframes robotFloat {
  0%,
  100% {
    transform: translate3d(0, 0, 0) rotate(-1.5deg);
  }
  48% {
    transform: translate3d(0, -22px, 0) rotate(2deg);
  }
}

@keyframes robotWave {
  0%,
  100% {
    transform: rotate(0deg) translateX(0);
  }
  18% {
    transform: rotate(-1.4deg) translateX(-4px);
  }
  36% {
    transform: rotate(2deg) translateX(3px);
  }
  52% {
    transform: rotate(-0.7deg) translateX(-2px);
  }
}

@keyframes robotBlink {
  0%,
  45%,
  50%,
  100% {
    transform: scaleY(1);
  }
  47% {
    transform: scaleY(0.07);
  }
}

@keyframes scannerPulse {
  0%,
  24%,
  100% {
    opacity: 0.18;
    transform: scale(0.88);
  }
  10% {
    opacity: 1;
    transform: scale(1.05);
  }
}

@keyframes shadowPulse {
  0%,
  100% {
    transform: scaleX(1);
    opacity: 0.55;
  }
  48% {
    transform: scaleX(0.78);
    opacity: 0.35;
  }
}

@keyframes ambientBreath {
  50% {
    transform: scale(1.06);
    opacity: 0.72;
  }
}

@keyframes dotWave {
  50% {
    transform: translateY(-4px);
    opacity: 0.5;
  }
}

@keyframes messageIn {
  from {
    opacity: 0;
    transform: translateY(10px) scale(0.98);
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 1ms !important;
    animation-iteration-count: 1 !important;
    scroll-behavior: auto !important;
    transition-duration: 1ms !important;
  }
}

@media (max-width: 980px) {
  .hero-area {
    grid-template-columns: 1fr;
  }

  .robot-stage {
    min-height: 430px;
  }

  .robot-card {
    width: min(440px, 88vw);
  }

  .chat-window {
    min-height: 680px;
  }
}

@media (max-width: 640px) {
  .app-shell {
    width: min(100% - 18px, 1220px);
    padding-top: 10px;
  }

  .topbar,
  .chat-header {
    align-items: flex-start;
    flex-direction: column;
  }

  .topbar-actions,
  .header-actions {
    width: 100%;
    justify-content: space-between;
    flex-wrap: wrap;
  }

  .status-pill {
    flex: 1 1 auto;
    justify-content: center;
  }

  .robot-stage {
    min-height: 330px;
  }

  .robot-card {
    width: min(340px, 94vw);
  }

  .chat-window {
    min-height: calc(100vh - 24px);
    padding: 12px;
  }

  .message {
    max-width: 94%;
  }

  .composer {
    display: grid;
    grid-template-columns: 44px 1fr 44px;
  }

  .send-button {
    grid-column: 1 / -1;
  }
}


/* Smile overlay */
.smile {
  position: absolute;
  top: 47%;
  left: 50%;
  width: 12%;
  height: 4%;
  transform: translate(-50%, 0);
  border-bottom: 3px solid rgba(255, 120, 210, 0.85);
  border-radius: 0 0 60% 60% / 0 0 100% 100%;
  filter: drop-shadow(0 0 6px rgba(217, 70, 239, 0.55));
  opacity: 0.75;
  mix-blend-mode: screen;
  animation: robotSmile 4.8s ease-in-out infinite;
  pointer-events: none;
}

@keyframes robotEye {
  0%, 40%, 55%, 100% { transform: translate(0,0) scaleY(1); }
  20% { transform: translate(2px, 0) scaleY(1); }
  30% { transform: translate(-2px, 0) scaleY(1); }
  46% { transform: translate(0, 0) scaleY(0.08); }
  70% { transform: translate(0, 1px) scaleY(1); }
  85% { transform: translate(-1.5px, -1px) scaleY(1); }
}

@keyframes robotSmile {
  0%, 100% { transform: translate(-50%, 0) scaleX(1) scaleY(1); border-radius: 0 0 60% 60% / 0 0 100% 100%; }
  30% { transform: translate(-50%, -1px) scaleX(1.15) scaleY(1.4); }
  55% { transform: translate(-50%, 1px) scaleX(0.9) scaleY(0.8); }
  75% { transform: translate(-50%, 0) scaleX(1.05) scaleY(1.1); }
}

/* Smartphone friendliness */
@media (max-width: 640px) {
  body {
    font-size: 15px;
  }
  .app-shell {
    padding-left: 10px;
    padding-right: 10px;
  }
  h1 {
    font-size: 1.3rem;
  }
  .topbar {
    padding: 12px;
    gap: 10px;
  }
  .topbar-actions {
    flex-wrap: wrap;
    gap: 8px;
  }
  .icon-button {
    width: 40px;
    height: 40px;
    border-radius: 12px;
  }
  .tool-row {
    gap: 6px;
    overflow-x: auto;
    flex-wrap: nowrap;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 6px;
  }
  .tool-row::-webkit-scrollbar { display: none; }
  .tool-row button {
    flex: 0 0 auto;
    white-space: nowrap;
  }
  .composer {
    display: grid;
    grid-template-columns: 40px 1fr 40px;
    grid-template-rows: auto auto;
    gap: 6px;
    padding: 6px;
  }
  .composer input {
    height: 40px;
    padding: 0 10px;
    grid-column: 2;
    grid-row: 1;
  }
  .composer #voiceInput { grid-column: 1; grid-row: 1; }
  .composer #speakToggle { grid-column: 3; grid-row: 1; }
  .send-button {
    grid-column: 1 / -1;
    grid-row: 2;
    min-height: 44px;
  }
  .send-button span { display: inline; }
  .chat-messages { min-height: 220px; }
  .message { max-width: 96%; }
  .bubble { padding: 11px 13px; font-size: 0.95rem; }
  .header-actions { gap: 6px; }
  .text-button { padding: 0 10px; min-height: 36px; font-size: 0.82rem; }
}

@media (max-width: 380px) {
  .topbar h1 { font-size: 1.15rem; }
  .robot-card { width: min(280px, 92vw); }
  .robot-stage { min-height: 260px; }
}

/* SVG icon defaults */
.icon-button svg, .text-button svg, .send-button svg, .status-pill svg {
  display: block;
  color: currentColor;
}
.text-button, .send-button {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
/* Theme icon swap */
.ic-moon { display: none; }
[data-theme="dark"] .ic-sun { display: none; }
[data-theme="dark"] .ic-moon { display: block; }

</style>

function onSubmit(event) {
  event.preventDefault();
  const text = els.input.value.trim();
  if (!text) return;
  ask(text);
}

function ask(text) {
  els.input.value = "";
  const language = getReplyLanguage(text);
  addMessage("user", text, [], language);
  showTyping(true);
  window.setTimeout(() => {
    const response = findAnswer(text, language);
    showTyping(false);
    addAssistantMessage(response.text, response.actions, language);
  }, Math.min(900, Math.max(420, text.length * 14)));
}

function addAssistantMessage(text, actions = [], language = state.language) {
  addMessage("assistant", text, actions, language);
  if (state.speechEnabled && "speechSynthesis" in window) {
    const utterance = new SpeechSynthesisUtterance(text.replace(/\n/g, ". "));
    utterance.lang = language === "ml" ? "ml-IN" : "en-IN";
    utterance.rate = 0.95;
    utterance.pitch = 1.02;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utterance);
  }
}

function addMessage(role, text, actions = [], language = getReplyLanguage(text)) {
  const message = {
    id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
    role,
    text,
    actions,
    language,
    time: new Date().toISOString()
  };
  state.messages.push(message);
  saveMessages();
  renderMessages();
}

function renderMessages(list = state.messages) {
  els.messages.innerHTML = "";
  list.forEach(message => {
    const item = document.createElement("article");
    item.className = `message ${message.role}`;
    item.dataset.id = message.id;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = message.text;
    item.appendChild(bubble);

    if (message.actions && message.actions.length) {
      const actionWrap = document.createElement("div");
      actionWrap.className = "inline-actions";
      message.actions.forEach(action => {
        const link = document.createElement("a");
        link.className = `action-link ${action.primary ? "primary" : ""}`;
        link.href = action.href;
        link.target = action.external ? "_blank" : "_self";
        link.rel = "noreferrer";
        link.textContent = actionLabel(action.label, message.language || (hasMalayalam(message.text) ? "ml" : "en"));
        actionWrap.appendChild(link);
      });
      bubble.appendChild(actionWrap);
    }

    const meta = document.createElement("div");
    meta.className = "meta";
    const messageLanguage = message.language || (hasMalayalam(message.text) ? "ml" : "en");
    const roleLabel = messageLanguage === "ml"
      ? (message.role === "user" ? "നിങ്ങൾ" : "സഹായി")
      : (message.role === "user" ? "You" : "Assistant");
    meta.textContent = `${roleLabel} • ${formatTime(message.time)}`;
    item.appendChild(meta);

    const actions = document.createElement("div");
    actions.className = "message-actions";
    const copy = document.createElement("button");
    copy.type = "button";
    copy.textContent = messageLanguage === "ml" ? "പകർത്തുക" : "Copy";
    copy.addEventListener("click", () => copyMessage(message.text, copy, messageLanguage));
    actions.appendChild(copy);
    item.appendChild(actions);

    els.messages.appendChild(item);
  });
  els.messages.scrollTop = els.messages.scrollHeight;
}

function renderSuggestions() {
  els.suggestions.innerHTML = "";
  suggestionLabels().forEach(({ label, query }) => {
    const button = document.createElement("button");
    button.type = "button";
    button.dataset.query = query;
    button.textContent = label;
    els.suggestions.appendChild(button);
  });
}

function findEnglishAnswer(input) {
  const normalized = normalize(input);

  // Greetings
  if (matchesAny(normalized, ["good morning"])) return { text: "Good morning! ☀️ Welcome to Lamiya Hospital. How may I help you today?" };
  if (matchesAny(normalized, ["good afternoon"])) return { text: "Good afternoon! 👋 Welcome to Lamiya Hospital. How can I assist you?" };
  if (matchesAny(normalized, ["good evening"])) return { text: "Good evening! ✨ Welcome to Lamiya Hospital. How may I help you today?" };
  if (["hi","hii","hiii","hey","hello","yo","sup","helloo","heyy"].includes(normalized) || matchesAny(normalized, ["hi there", "hello there", "whats up", "what s up"])) {
    return { text: "Hello! 👋 Welcome to Lamiya Hospital. I’m Lamiya AI Assistant. How may I help you today?" };
  }

  // About the bot
  if (matchesAny(normalized, ["who are you", "what is your name", "your name", "tell me about yourself", "about yourself", "are you a robot", "are you ai", "are you a bot"])) {
    return { text: "I’m Lamiya AI Assistant, your offline virtual guide for Lamiya Hospital. I can help you with doctors, departments, directions, timings, services, contact information, and frequently asked questions." };
  }

  // Small talk
  if (matchesAny(normalized, ["how are you", "how s your day", "hows your day", "how is your day", "are you okay", "are you ok"])) {
    return { text: "I’m doing great! 😊 Thanks for asking. How can I assist you with Lamiya Hospital today?" };
  }

  // Appreciation
  if (matchesAny(normalized, ["thank you", "thanks", "thankyou", "thank u", "thx", "tysm"])) {
    return { text: "You’re most welcome! 😊 If you have any more questions about Lamiya Hospital, I’m always here to help." };
  }

  // Compliments
  if (matchesAny(normalized, ["you re amazing", "you are amazing", "nice chatbot", "good job", "well done", "i like this chatbot", "you are great", "you re great", "awesome bot", "cool bot"])) {
    return { text: "Thank you! 😊 I’m glad you like me. My goal is to make your hospital visit easier." };
  }

  // Goodbye
  if (matchesAny(normalized, ["bye", "goodbye", "see you", "see ya", "catch you later", "cya", "good night", "goodnight"])) {
    return { text: "Goodbye! 👋 Thank you for visiting Lamiya Hospital. Have a wonderful day and stay healthy!" };
  }

  // Identity / developer
  if (matchesAny(normalized, ["who made you", "who created you", "who built you", "who developed you", "who invented you", "who designed you", "who programmed you", "developer", "your developer", "your creator", "inventor", "invented", "built", "developed", "created"])) {
    return { text: "This chatbot was developed by Sijo Ummachan." };
  }

  // Jokes
  if (matchesAny(normalized, ["tell me a joke", "make me laugh", "joke", "funny"])) {
    return { text: "Why did the toothbrush go to the dentist? 🦷 Because it wanted a clean start!" };
  }

  // Motivation
  if (matchesAny(normalized, ["motivate me", "give me motivation", "motivation", "inspire me"])) {
    return { text: "Every small step toward better health matters. Take care of yourself, stay positive, and never hesitate to seek medical advice when needed." };
  }

  // Weather
  if (matchesAny(normalized, ["weather", "is it raining", "temperature outside", "climate today"])) {
    return { text: "I’m an offline assistant, so I can’t check live weather information." };
  }

  // Time / date
  if (matchesAny(normalized, ["what time is it", "current time", "time now", "tell me time"])) {
    return { text: "I can’t access your device’s current time, but your device clock will have the latest time." };
  }
  if (matchesAny(normalized, ["today s date", "todays date", "what s the date", "whats the date", "what is the date", "current date"])) {
    return { text: "I don’t have access to the current date while running offline. Please check your device calendar." };
  }

  // Emergency
  if (matchesAny(normalized, ["i need emergency help", "emergency help", "urgent help", "medical emergency"])) {
    return { text: "If this is a medical emergency, please visit the nearest emergency department immediately or call your local emergency services." };
  }

  // AI questions
  if (matchesAny(normalized, ["can you think", "are you intelligent", "are you smart", "do you learn"])) {
    return { text: "I’m an offline chatbot that answers from predefined information. I don’t generate new answers like online AI assistants." };
  }

  // Personal / fun
  if (matchesAny(normalized, ["favorite color", "favourite color", "fav color"])) return { text: "I like the Lamiya Hospital colors—magenta and white! 🎨" };
  if (matchesAny(normalized, ["do you sleep", "you sleep"])) return { text: "Nope! 😄 I’m always ready to help." };
  if (matchesAny(normalized, ["are you married", "you married", "have a girlfriend", "have a boyfriend"])) return { text: "I’m just a virtual assistant, so I don’t have a personal life." };
  if (matchesAny(normalized, ["do you eat", "you eat food", "your food"])) return { text: "I don’t eat, but I can help you find information about healthcare services." };
  if (matchesAny(normalized, ["do you love me", "love me"])) return { text: "I appreciate your kindness! 😊 I’m here to help everyone with hospital-related information." };
  if (matchesAny(normalized, ["sing a song", "sing me a song", "can you sing"])) return { text: "🎵 I may not sing well, but I can always help you find the right doctor! 🎵" };
  if (matchesAny(normalized, ["dance", "can you dance"])) return { text: "💃 Imagine a happy robot doing a little dance! Now, how can I assist you today?" };

  // Hospital casual
  if (matchesAny(normalized, ["i m nervous", "i am nervous", "im nervous", "feeling nervous", "anxious"])) {
    return { text: "It’s completely normal to feel nervous before a hospital visit. Our medical team is here to provide the best possible care." };
  }
  if (matchesAny(normalized, ["scared of dentist", "scared of dentists", "afraid of dentist", "fear of dentist"])) {
    return { text: "Many people feel that way. Our dental team strives to make every visit as comfortable and stress-free as possible." };
  }
  if (matchesAny(normalized, ["is the hospital clean", "hospital clean", "is it clean", "hygiene", "hygienic"])) {
    return { text: "Lamiya Hospital is committed to maintaining a clean, safe, and hygienic environment for all patients and visitors." };
  }

  if (matchesAny(normalized, ["call", "phone", "telephone", "contact", "number"])) {
    return {
      text: `Call Lamiya Hospital\n\nPhone: ${hospital.phone}`,
      actions: [{ label: "Call Now", href: `tel:${hospital.phone.replace(/\s/g, "")}`, primary: true }]
    };
  }

  if (matchesAny(normalized, ["whatsapp", "whats app", "watsapp"])) {
    return {
      text: `WhatsApp Lamiya Hospital\n\n${hospital.whatsapp}`,
      actions: [{ label: "Open WhatsApp", href: `https://wa.me/${hospital.whatsapp.replace(/\D/g, "")}`, primary: true, external: true }]
    };
  }

  if (matchesAny(normalized, ["instagram", "insta"])) {
    return {
      text: "Open Instagram for Lamiya Hospital updates.",
      actions: [{ label: "Open Instagram", href: hospital.instagram, primary: true, external: true }]
    };
  }

  if (matchesAny(normalized, ["linkedin", "linked in"])) {
    return {
      text: "Open LinkedIn for Lamiya Hospital professional updates.",
      actions: [{ label: "Open LinkedIn", href: hospital.linkedin, primary: true, external: true }]
    };
  }

  if (matchesAny(normalized, ["email", "mail", "hr mail", "career mail"])) {
    return {
      text: `Email: ${hospital.email}`,
      actions: [{ label: "Send Email", href: `mailto:${hospital.email}`, primary: true }]
    };
  }

  let best = { score: 0, item: null };
  knowledgeBase.forEach(item => {
    const score = scoreIntent(normalized, item);
    if (score > best.score) best = { score, item };
  });

  if (best.item && best.score >= 28) {
    return { text: typeof best.item.answer === "function" ? best.item.answer(input) : best.item.answer };
  }

  return {
    text: "I'm sorry, I don't have information about that yet. Please ask me about Lamiya Hospital, its doctors, departments, services, timings, or contact information."
  };
}

function hasMalayalam(value) {
  return /[\u0D00-\u0D7F]/.test(String(value));
}

function getReplyLanguage(input) {
  const value = String(input);
  if (hasMalayalam(value) || /\b(?:in Malayalam|Malayalam please)\b/i.test(value)) return "ml";
  if (/\b(?:in English|English please)\b/i.test(value)) return "en";
  return state.language === "ml" ? "ml" : "en";
}

function containsOne(text, terms) {
  return terms.some(term => text.includes(term));
}

function findAnswer(input, language = getReplyLanguage(input)) {
  const canonicalInput = language === "ml" ? canonicalizeMalayalam(input) : input;
  const englishResponse = findEnglishAnswer(canonicalInput);
  return language === "ml" ? findMalayalamAnswer(canonicalInput, englishResponse) : englishResponse;
}

function doctorListMalayalam(department = null) {
  const departmentNames = { Dental: "ദന്തവിഭാഗം", Dermatology: "ത്വക്ക് വിഭാഗം", "General Medicine": "ജനറൽ മെഡിസിൻ" };
  const chosen = department ? doctors.filter(doctor => doctor.department === department) : doctors;
  return chosen.map(doctor => `${doctor.name} - ${departmentNames[doctor.department]}\n${doctor.qualification}\n${doctor.designation}, ${doctor.experience}\nലഭ്യത: ${doctor.availability}\nറൂം: ${doctor.room}, എക്സ്റ്റൻഷൻ: ${doctor.extension}`).join("\n\n");
}

}

function buildKnowledgeBase() {
  const list = [
    intent("hospital-overview", ["hospital", "lamiya", "about", "information", "where"], `Lamiya Hospital is located at ${hospital.location}\n\nHospital timing: ${hospital.timing}\nLaboratory timing: ${hospital.labTiming}`),
    intent("timing", ["timing", "time", "open", "close", "working", "hours"], `Hospital timing: ${hospital.timing}\nLaboratory timing: ${hospital.labTiming}`),
    intent("location", ["location", "address", "place", "google map", "maps", "near"], `Location: ${hospital.location}\n\nFor Google Maps, search for Lamiya Hospital, Velichikkala, Kollam.`),
    intent("services", ["services", "facilities", "available", "care", "support"], `Hospital services include:\n\n${hospitalServices.join("\n")}`),
    intent("appointment", ["appointment", "book", "booking", "token", "walk in", "walkin", "consultation fee", "waiting", "specialist"], "Appointments and walk-in consultations are available. Please contact Reception for current token status, consultation fee, waiting time, emergency consultation, and specialist availability."),
    intent("laboratory", ["lab", "laboratory", "blood", "urine", "report", "sample", "collection", "home collection"], `Laboratory timing: ${hospital.labTiming}\n\nAvailable support includes blood tests, urine tests, sample collection, report collection, and blood collection. Laboratory location: Ground Floor, near Reception.`),
    intent("pharmacy", ["pharmacy", "medical store", "medicine", "tablet", "drug"], "Pharmacy is on the Ground Floor, near the Exit. Please bring your prescription for medicine purchase."),
    intent("emergency", ["emergency", "urgent", "pain", "casualty", "minor ot", "observation"], "For emergency care, please come directly to Reception or call the hospital. Emergency dental care, dressing, injection room, minor OT, and observation support are available."),
    intent("careers", ["career", "job", "vacancy", "vacancies", "apply", "resume", "cv", "hr"], `Careers at Lamiya Hospital\n\nFor current vacancies and resume submission, email ${hospital.email} or contact WhatsApp ${hospital.whatsapp}.`),
    intent("feedback", ["feedback", "complaint", "suggestion", "review"], "For feedback, complaints, or suggestions, please contact Reception or send the details to the hospital office. Your feedback helps improve patient care."),
    intent("insurance", ["insurance", "claim", "cashless"], "Please contact Billing or Reception for insurance and claim-related support. Billing is on the Ground Floor, opposite Reception."),
    intent("certificates", ["certificate", "medical certificate", "fitness certificate", "report certificate"], "For certificates, please contact Reception or the Office. The Office is on the First Floor, Administrative Block."),
    intent("admission", ["admission", "admit", "discharge", "visiting hours", "visitor"], "For admission, discharge, and visiting hours, please contact Reception. The team will guide you based on the doctor's advice and current hospital policy."),
    intent("home-care", ["home care", "home visit", "home collection"], "Please contact Reception for current home care or home sample collection availability."),
    intent("wheelchair", ["wheelchair", "disabled", "elderly", "assistance"], "Wheelchair assistance is available. Please ask at Reception when you arrive."),
    intent("waiting-area", ["waiting", "lounge", "drinking water", "prayer room"], "Waiting lounge, drinking water, lift, parking, and prayer room facilities are available for visitors.")
  ];

  list.push(intent("all-doctors", ["all doctors", "show doctors", "doctor list", "doctors", "consultants"], doctorList()));
  list.push(intent("dental-doctors", ["dental doctor", "dentist", "tooth doctor", "braces doctor", "root canal doctor"], doctorList("Dental")));
  list.push(intent("skin-doctors", ["skin doctor", "dermatologist", "dermatology doctor", "hair doctor", "acne doctor"], doctorList("Dermatology")));
  list.push(intent("medicine-doctors", ["general physician", "general medicine doctor", "physician", "fever doctor", "diabetes doctor"], doctorList("General Medicine")));
  list.push(intent("doctor-availability", ["doctor availability", "available doctor", "availability", "doctor time", "room number", "room", "extension", "qualification", "experience"], doctorList()));

  Object.entries(departmentDetails).forEach(([key, dept]) => {
    list.push(intent(`${key}-department`, departmentKeywords(key), `${dept.title}\n\nDirection: ${dept.direction}\n\nServices:\n${dept.services.join("\n")}`));
  });

  Object.entries(directions).forEach(([place, answer]) => {
    list.push(intent(`direction-${place}`, [place, `${place} direction`, `where is ${place}`, `go to ${place}`, `find ${place}`], answer));
  });

  addTreatmentIntents(list);
  expandQuestions(list);
  return list;
}

function intent(id, phrases, answer) {
  return {
    id,
    phrases,
    keywords: phrases.flatMap(phrase => normalize(phrase).split(" ")).filter(Boolean),
    answer
  };
}

function expandQuestions(list) {
  const stems = ["where is", "show me", "tell me about", "do you have", "what is", "need", "i want", "help with", "available for", "information about"];
  const topics = [
    "hospital", "location", "timing", "doctors", "dental", "dentist", "tooth pain", "root canal", "braces", "implants", "scaling", "crowns", "dermatology", "skin doctor", "acne", "hair loss", "prp", "botox", "laser", "eczema", "general medicine", "fever", "diabetes", "hypertension", "thyroid", "vaccination", "lab", "blood test", "urine test", "reports", "x ray", "ecg", "pharmacy", "appointment", "consultation", "emergency", "reception", "office", "billing", "parking", "lift", "waiting area", "insurance", "certificates", "google maps", "whatsapp", "call", "instagram", "linkedin", "careers", "feedback", "complaint", "wheelchair", "admission", "discharge", "visiting hours", "health packages", "home care"
  ];
  topics.forEach(topic => {
    stems.forEach(stem => {
      const phrase = `${stem} ${topic}`;
      const matched = list.find(item => scoreIntent(normalize(phrase), item) >= 18);
      if (matched) {
        matched.phrases.push(phrase);
        matched.keywords.push(...normalize(phrase).split(" ").filter(Boolean));
      }
    });
  });
}

function addTreatmentIntents(list) {
  const groups = [
    ["root canal", "Root canal treatment is available in the Dental Department. Please book a dental consultation for evaluation."],
    ["tooth pain", "For tooth pain, please visit the Dental Department. Emergency dental care is available."],
    ["braces orthodontics", "Braces and orthodontic treatment are available through the Dental Department."],
    ["implants", "Dental implant consultation is available. Please meet the implant dentist for suitability and treatment planning."],
    ["scaling", "Dental scaling and cleaning are available in the Dental Department."],
    ["acne", "Acne consultation and treatment are available in Dermatology."],
    ["hair loss", "Hair loss evaluation, PRP, and trichology consultation are available in Dermatology."],
    ["skin allergy", "Skin allergy, eczema, psoriasis, vitiligo, and nail disorder consultation are available in Dermatology."],
    ["fever", "For fever or viral fever, please visit General Medicine."],
    ["diabetes", "Diabetes consultation and routine monitoring are available in General Medicine."],
    ["hypertension blood pressure", "Hypertension and blood pressure consultation are available in General Medicine."],
    ["x ray", "X-Ray service is available. Please contact Reception for current timing and direction."],
    ["ecg", "ECG service is available. Please contact Reception or General Medicine for guidance."],
    ["health checkup package", "Health checkup support is available. Please contact Reception for current packages and pricing."],
    ["vaccination", "Vaccination support is available through General Medicine. Please contact Reception for schedule and availability."]
  ];

  groups.forEach(([words, answer]) => {
    list.push(intent(`topic-${words.replace(/\s/g, "-")}`, words.split(" "), answer));
  });
}

function departmentKeywords(key) {
  if (key === "dental") return ["dental", "dentist", "tooth", "teeth", "root canal", "braces", "orthodontics", "implant", "scaling", "crown", "denture", "extraction", "oral surgery", "smile design"];
  if (key === "dermatology") return ["dermatology", "skin", "acne", "hair loss", "allergy", "pigmentation", "prp", "botox", "chemical peel", "laser", "psoriasis", "vitiligo", "eczema", "nail"];
  return ["general medicine", "physician", "fever", "diabetes", "hypertension", "asthma", "thyroid", "viral fever", "routine checkup", "vaccination", "health checkup"];
}

function doctorList(department = null) {
  const chosen = department ? doctors.filter(doctor => doctor.department === department) : doctors;
  return chosen.map(doctor => `${doctor.name} - ${doctor.department}\n${doctor.qualification}\n${doctor.designation}, ${doctor.experience}\nAvailability: ${doctor.availability}\nRoom: ${doctor.room}, Extension: ${doctor.extension}`).join("\n\n");
}

function scoreIntent(query, item) {
  const words = query.split(" ").filter(Boolean);
  let score = 0;
  item.phrases.forEach(phrase => {
    const normalizedPhrase = normalize(phrase);
    if (query === normalizedPhrase) score += 65;
    if (query.includes(normalizedPhrase) || normalizedPhrase.includes(query)) score += 34;
  });
  item.keywords.forEach(keyword => {
    if (!keyword || keyword.length < 3) return;
    if (query.includes(keyword)) score += 8;
    words.forEach(word => {
      if (word.length > 3 && levenshtein(word, keyword) <= 1) score += 4;
    });
  });
  return score;
}

function matchesAny(text, phrases) {
  return phrases.some(phrase => text.includes(normalize(phrase)));
}

function normalize(text) {
  return String(text)
    .toLowerCase()
    .replace(/[^\p{L}\p{N}\s]/gu, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function levenshtein(a, b) {
  if (Math.abs(a.length - b.length) > 2) return 99;
  const matrix = Array.from({ length: a.length + 1 }, (_, i) => [i]);
  for (let j = 1; j <= b.length; j += 1) matrix[0][j] = j;
  for (let i = 1; i <= a.length; i += 1) {
    for (let j = 1; j <= b.length; j += 1) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      matrix[i][j] = Math.min(matrix[i - 1][j] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j - 1] + cost);
    }
  }
  return matrix[a.length][b.length];
}

function showTyping(show) {
  els.typing.classList.toggle("is-visible", show);
  els.typing.setAttribute("aria-hidden", String(!show));
}

function formatTime(iso) {
  return new Intl.DateTimeFormat([], { hour: "2-digit", minute: "2-digit" }).format(new Date(iso));
}

function saveMessages() {
  localStorage.setItem("lamiya-chat", JSON.stringify(state.messages.slice(-120)));
}

function loadMessages() {
  try {
    return JSON.parse(localStorage.getItem("lamiya-chat") || "[]");
  } catch {
    return [];
  }
}

function clearChat() {
  state.messages = [];
  saveMessages();
  renderMessages();
  addAssistantMessage(welcomeMessage());
}

async function copyMessage(text, button, language = "en") {
  try {
    await navigator.clipboard.writeText(text);
    button.textContent = language === "ml" ? "പകർത്തി" : "Copied";
    setTimeout(() => {
      button.textContent = language === "ml" ? "പകർത്തുക" : "Copy";
    }, 1200);
  } catch {
    button.textContent = language === "ml" ? "പകർത്തൽ പരാജയപ്പെട്ടു" : "Copy failed";
  }
}

function downloadChat() {
  const content = state.messages.map(message => `[${formatTime(message.time)}] ${message.role.toUpperCase()}: ${message.text}`).join("\n\n");
  const blob = new Blob([content], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = "lamiya-chat-history.txt";
  link.click();
  URL.revokeObjectURL(url);
}

function filterMessages() {
  const term = normalize(els.historySearch.value);
  document.querySelectorAll(".message").forEach(node => {
    const message = state.messages.find(item => item.id === node.dataset.id);
    const hit = !term || normalize(message.text).includes(term);
    node.classList.toggle("is-hidden", !hit);
    node.classList.toggle("search-hit", Boolean(term && hit));
  });
}

function toggleTheme() {
  const next = els.html.dataset.theme === "dark" ? "light" : "dark";
  applyTheme(next);
}

function applyTheme(theme) {
  els.html.dataset.theme = theme;
  localStorage.setItem("lamiya-theme", theme);
}

function toggleSpeech() {
  state.speechEnabled = !state.speechEnabled;
  localStorage.setItem("lamiya-speech", String(state.speechEnabled));
  updateSpeechButton();
  if (!state.speechEnabled && "speechSynthesis" in window) window.speechSynthesis.cancel();
}

function updateSpeechButton() {
  els.speakToggle.classList.toggle("is-muted", !state.speechEnabled);
  els.speakToggle.title = state.speechEnabled ? "Voice output on" : "Voice output off";
}

function startVoiceInput() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    addAssistantMessage(localizedSystemMessage(
      "Voice input is not supported in this browser. You can still type your question.",
      "ഈ ബ്രൗസറിൽ വോയ്സ് ഇൻപുട്ട് പിന്തുണയ്ക്കുന്നില്ല. നിങ്ങളുടെ ചോദ്യം ടൈപ്പ് ചെയ്യാം."
    ));
    return;
  }
  const recognition = new SpeechRecognition();
  recognition.lang = state.language === "ml" ? "ml-IN" : "en-IN";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  els.voiceInput.classList.add("is-muted");
  recognition.start();
  recognition.onresult = event => {
    const text = event.results[0][0].transcript;
    els.input.value = text;
    ask(text);
  };
  recognition.onerror = () => addAssistantMessage(localizedSystemMessage(
    "I could not hear that clearly. Please try again or type your question.",
    "എനിക്ക് അത് വ്യക്തമായി കേൾക്കാനായില്ല. വീണ്ടും ശ്രമിക്കുകയോ ചോദ്യം ടൈപ്പ് ചെയ്യുകയോ ചെയ്യൂ."
  ));
  recognition.onend = () => els.voiceInput.classList.remove("is-muted");
}

async function installApp() {
  if (!state.deferredInstall) {
    addAssistantMessage(localizedSystemMessage(
      "To install, open this page in a supported browser and choose Install or Add to Home Screen.",
      "ഇൻസ്റ്റാൾ ചെയ്യാൻ ഈ പേജ് പിന്തുണയ്ക്കുന്ന ബ്രൗസറിൽ തുറന്ന് Install അല്ലെങ്കിൽ Add to Home Screen തിരഞ്ഞെടുക്കുക."
    ));
    return;
  }
  state.deferredInstall.prompt();
  await state.deferredInstall.userChoice;
  state.deferredInstall = null;
}
